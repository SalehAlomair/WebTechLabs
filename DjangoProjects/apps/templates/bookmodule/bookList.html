{% extends "layouts/base.html" %}
{% block title %} Search Results {% endblock title %}

{% block content %}
<h1>Books List</h1>

{% if books %}
    {% for obj in books %}
        ID: {{ obj.id }}, Title: {{ obj.title }}
        <hr>
    {% endfor %}
{% else %}
    <p>No matching books found.</p>
{% endif %}
{% endblock content %}
