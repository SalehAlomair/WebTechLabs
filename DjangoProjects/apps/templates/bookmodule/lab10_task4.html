{% extends "layouts/base.html" %}

{% block title %}Lab10 Task4{% endblock title %}

{% block content %}
<h2>Lab10 Task4: Delete Book</h2>
<p>Are you sure you want to delete <strong>{{ book.title }}</strong> (ID: {{ book.id }})?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, Delete</button>
  <a href="/books/lab10/task1">Cancel</a>
</form>
{% endblock content %}
